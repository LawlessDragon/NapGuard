<html>
<head>
    <title>NapGuard</title>
    <script>
        // Function to trigger the hybrid alarm system
        function triggerAlarm() {
            // Using the Vibration API
            if (navigator.vibrate) {
                navigator.vibrate([1000, 500, 1000]); // Vibration pattern
            }

            // Using the Web Audio API to create sound
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, audioContext.currentTime); // A4 note
            oscillator.connect(audioContext.destination);
            oscillator.start();

            // Notifications using the Notification API
            if (Notification.permission === 'granted') {
                new Notification('Alarm Triggered!', { body: 'Time to wake up!' });
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        new Notification('Alarm Triggered!', { body: 'Time to wake up!' });
                    }
                });
            }
            oscillator.stop(audioContext.currentTime + 3); // Stop after 3 seconds
        }
    </script>
</head>
<body>
    <h1>Welcome to NapGuard!</h1>
    <button onclick="triggerAlarm()">Start Alarm</button>
</body>
</html>
