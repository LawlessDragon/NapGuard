<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>NapGuard</title>\n</head>\n<body>\n    <h1>NapGuard - Hybrid Alarm System</h1>\n    <p>This alarm system combines Sound, Vibration, and Notification features to help you wake up effectively.</p>\n    <script>\n        function triggerAlarm() {\n            // Sound Alarm\n            var audio = new Audio('alarm-sound.mp3');\n            audio.play();\n            // Vibration Alarm\n            if (navigator.vibrate) {\n                navigator.vibrate([500, 300, 500, 300, 500]); // Custom vibration pattern\n            }\n            // Notification Alarm\n            Notification.requestPermission().then(function(permission) {\n                if (permission === 'granted') {\n                    new Notification('Time to Wake Up!', {\n                        body: 'Your nap is over!\n                     });\n                }\n            });\n        }\n\n        // Set the alarm time (in milliseconds)\n        var alarmTime = new Date().getTime() + 60000; // 1 minute later\n        setTimeout(triggerAlarm, alarmTime - new Date().getTime());\n    </script>\n</body>\n</html>
