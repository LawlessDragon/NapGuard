<html>
<head>
    <title>Hybrid Alarm System</title>
    <script>
        // Sound Implementation using Web Audio API
        function playSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, audioContext.currentTime); // A note
            oscillator.connect(audioContext.destination);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 1); // Play for 1 second
        }

        // Vibration Implementation using Vibration API
        function triggerVibration() {
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200]); // Vibrate pattern
            } else {
                alert('Vibration API not supported on this device.');
            }
        }

        // Notification Implementation using Notification API
        function triggerNotification() {
            if (Notification.permission === 'granted') {
                new Notification('Alarm Triggered!', { body: 'Your hybrid alarm has been activated!' });
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        triggerNotification();
                    }
                });
            }
        }

        // Alarm Trigger Function
        function triggerAlarm() {
            playSound();
            triggerVibration();
            triggerNotification();
        }
    </script>
</head>
<body>
    <h1>Hybrid Alarm System</h1>
    <button onclick="triggerAlarm()">Trigger Alarm</button>
</body>
</html>
