<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Alarm System</title>
</head>
<body>
    <h1>Hybrid Alarm System</h1>
    <button id="setAlarm">Set Alarm</button>
    <script>
        // Web Audio API
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let sound;

        const loadSound = async (url) => {
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            sound = await audioContext.decodeAudioData(arrayBuffer);
        };

        const playSound = () => {
            const source = audioContext.createBufferSource();
            source.buffer = sound;
            source.connect(audioContext.destination);
            source.start(0);
        };

        // Vibration API
        const vibrate = () => {
            if (navigator.vibrate) {
                navigator.vibrate([500, 200, 500]); // Custom vibration pattern
            }
        };

        // Notification API
        const showNotification = (title, body) => {
            if (Notification.permission === 'granted') {
                new Notification(title, { body });
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        new Notification(title, { body });
                    }
                });
            }
        };

        document.getElementById('setAlarm').addEventListener('click', () => {
            const alarmTime = new Date(Date.now() + 10000); // Set alarm for 10 seconds later
            setTimeout(() => {
                playSound();
                vibrate();
                showNotification('Alarm!', 'Your alarm is ringing.');
            }, alarmTime - Date.now());
        });

        // Load the sound file (replace 'alarm.mp3' with your sound file)
        loadSound('alarm.mp3');
    </script>
</body>
</html>
